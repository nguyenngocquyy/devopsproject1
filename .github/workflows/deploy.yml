name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH and deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /root/project-1-devops
            git pull origin main
            docker build -t python-devops-web .
            docker rm -f python-devops-web || true
            docker run -d --name python-devops-web --restart unless-stopped -p 8080:5000 python-devops-web
